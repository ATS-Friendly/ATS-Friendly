
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ATS-Friendly CV Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=PT+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
      }
      .cv-preview-font {
        font-family: 'PT Serif', serif;
      }
      @media print {
        body * {
          visibility: hidden;
        }
        .print-area, .print-area * {
          visibility: visible;
        }
        .print-area {
          position: absolute;
          left: 0;
          top: 0;
          width: 100%;
          height: 100%;
        }
        @page {
          size: A4;
          margin: 0;
        }
      }
    </style>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Import Map -->
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "firebase/app": "https://esm.sh/firebase@10.12.2/app",
    "firebase/auth": "https://esm.sh/firebase@10.12.2/auth",
    "firebase/firestore": "https://esm.sh/firebase@10.12.2/firestore",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "firebase/": "https://esm.sh/firebase@^12.8.0/"
  }
}
</script>
  </head>
  <body>
    <div id="root"></div>
    
    <!-- Scripts loaded as modules with Babel -->
    <script type="text/babel" data-type="module" data-presets="env,react" src="./services/firebaseService.ts"></script>
    <script type="text/babel" data-type="module" data-presets="env,react" src="./components/TemplateView.tsx"></script>
    <script type="text/babel" data-type="module" data-presets="env,react" src="./components/LandingView.tsx"></script>
    <script type="text/babel" data-type="module" data-presets="env,react" src="./components/AuthView.tsx"></script>
    <script type="text/babel" data-type="module" data-presets="env,react" src="./components/EditorView.tsx"></script>
    <script type="text/babel" data-type="module" data-presets="env,react" src="./App.tsx"></script>
    <script type="text/babel" data-type="module" data-presets="env,react" src="./index.tsx"></script>
  </body>
</html>
