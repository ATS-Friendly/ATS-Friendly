
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ATS-Friendly CV Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=PT+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        overflow-x: hidden;
      }
      * { box-sizing: border-box; }
      .cv-preview-font { font-family: 'PT Serif', serif; }
      
      /* Debug Console Styles */
      #debug-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(185, 28, 28, 0.95);
        color: white;
        z-index: 9999;
        overflow: auto;
        padding: 2rem;
        font-family: monospace;
      }
      #debug-content {
        background: #000;
        border: 1px solid #444;
        padding: 1rem;
        border-radius: 0.5rem;
        white-space: pre-wrap;
      }
    </style>
    
    <script>
      window.onerror = function(msg, url, line, col, error) {
        // Ignore ResizeObserver errors which are harmless
        if(msg && msg.includes && msg.includes('ResizeObserver')) return;

        const overlay = document.getElementById('debug-overlay');
        const content = document.getElementById('debug-content');
        if (overlay && content) {
          overlay.style.display = 'block';
          const time = new Date().toLocaleTimeString();
          // Clean up the URL to just show filename
          const filename = url ? url.split('/').pop() : 'inline';
          content.innerText += `[${time}] ${msg}\nFile: ${filename}:${line}\n\n`;
        }
        console.error('Global Error:', msg, error);
        return false; 
      };
      console.log("System initializing...");
    </script>

    <!-- Babel Standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 
      CRITICAL: Import Map 
      This is the ONLY place where versions are defined. 
      All .ts/.tsx files must use these exact names (e.g. "firebase/app") 
    -->
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "firebase/app": "https://esm.sh/firebase@10.12.2/app",
    "firebase/auth": "https://esm.sh/firebase@10.12.2/auth",
    "firebase/firestore": "https://esm.sh/firebase@10.12.2/firestore",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "firebase/": "https://esm.sh/firebase@^12.8.0/"
  }
}
</script>
  </head>
  <body>
    <div id="debug-overlay">
      <h1 class="text-2xl font-bold mb-4">⚠️ Uygulama Hatası</h1>
      <p class="mb-4">Uygulama yüklenirken bir sorun oluştu.</p>
      <div id="debug-content"></div>
      <button onclick="window.location.reload()" class="mt-4 px-4 py-2 bg-white text-red-900 font-bold rounded">Sayfayı Yenile</button>
    </div>

    <div id="root"></div>
    
    <!-- 
      LOAD ORDER IS CRITICAL 
      1. Services (No dependencies on View)
      2. Components (No dependencies on App)
      3. App (Depends on Components)
      4. Index (Mounts App)
    -->
    <script type="text/babel" data-type="module" data-presets="typescript,react" src="./services/firebaseService.ts"></script>
    <script type="text/babel" data-type="module" data-presets="typescript,react" src="./components/TemplateView.tsx"></script>
    <script type="text/babel" data-type="module" data-presets="typescript,react" src="./components/LandingView.tsx"></script>
    <script type="text/babel" data-type="module" data-presets="typescript,react" src="./components/AuthView.tsx"></script>
    <script type="text/babel" data-type="module" data-presets="typescript,react" src="./components/EditorView.tsx"></script>
    <script type="text/babel" data-type="module" data-presets="typescript,react" src="./App.tsx"></script>
    <script type="text/babel" data-type="module" data-presets="typescript,react" src="./index.tsx"></script>
  </body>
</html>
