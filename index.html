<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ATS-Friendly CV Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=PT+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        overflow-x: hidden;
        background-color: #f3f4f6; /* bg-gray-100 */
      }
      * { box-sizing: border-box; }
      .cv-preview-font { font-family: 'PT Serif', serif; }
      
      /* Print Styles */
      @media print {
        @page { margin: 0; size: auto; }
        body { background: white; }
        .no-print { display: none !important; }
        .print-area { 
            transform: none !important; 
            width: 100% !important; 
            height: auto !important; 
            box-shadow: none !important;
            margin: 0 !important;
            padding: 0 !important;
        }
      }
    </style>
    
    <!-- Babel Standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Import Map -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client"
      }
    }
    </script>
</head>
<body>
    <div id="root"></div>

    <!-- 
      INLINED SCRIPTS START HERE
    -->

    <!-- 1. Mock Service -->
    <script type="text/babel" data-type="module" data-presets="typescript,react">
        // --- Mock Service (Same as before, ensuring data persistence) ---
        const LOCAL_STORAGE_USER_KEY = 'ats_mock_user';
        const LOCAL_STORAGE_DATA_KEY = 'ats_mock_data';

        const authObservers = [];

        const getMockUser = () => {
            const stored = localStorage.getItem(LOCAL_STORAGE_USER_KEY);
            return stored ? JSON.parse(stored) : null;
        };

        const auth = { currentUser: getMockUser() };

        const onAuthStateChanged = (authInstance, callback) => {
            authObservers.push(callback);
            callback(getMockUser());
            return () => {
                const index = authObservers.indexOf(callback);
                if (index > -1) authObservers.splice(index, 1);
            };
        };

        const notifyObservers = (user) => {
            auth.currentUser = user;
            authObservers.forEach(cb => cb(user));
        };

        const handleEmailAuth = async (isLogin, email, password) => {
            await new Promise(resolve => setTimeout(resolve, 500));
            const user = { uid: 'mock-user-1', email: email, displayName: email.split('@')[0] };
            localStorage.setItem(LOCAL_STORAGE_USER_KEY, JSON.stringify(user));
            notifyObservers(user);
            return user;
        };

        const loginWithGoogle = async () => {
            await new Promise(resolve => setTimeout(resolve, 500));
            const user = { uid: 'mock-google-1', email: 'user@gmail.com', displayName: 'Google User' };
            localStorage.setItem(LOCAL_STORAGE_USER_KEY, JSON.stringify(user));
            notifyObservers(user);
            return user;
        };

        const logout = async () => {
            localStorage.removeItem(LOCAL_STORAGE_USER_KEY);
            notifyObservers(null);
        };

        const saveCvDocument = async (userId, data) => {
            const allData = JSON.parse(localStorage.getItem(LOCAL_STORAGE_DATA_KEY) || '{}');
            allData[userId] = data;
            localStorage.setItem(LOCAL_STORAGE_DATA_KEY, JSON.stringify(allData));
        };

        const getCvDocument = async (userId) => {
            const allData = JSON.parse(localStorage.getItem(LOCAL_STORAGE_DATA_KEY) || '{}');
            return allData[userId] || null;
        };

        window.FirebaseService = {
            auth, onAuthStateChanged, handleEmailAuth, loginWithGoogle, logout, saveCvDocument, getCvDocument
        };
    </script>

    <!-- 2. TemplateView -->
    <script type="text/babel" data-type="module" data-presets="typescript,react">
        import React from 'react';

        const TemplateView = ({ onSelectTemplate }) => {
          return (
            <div className="flex flex-col items-center justify-center min-h-screen p-4 bg-gray-50 no-print">
              <div className="text-center">
                <h1 className="text-3xl font-bold text-gray-800 md:text-4xl">Şablon Seçin</h1>
              </div>
              <div className="grid grid-cols-1 gap-8 mt-12 md:grid-cols-2 max-w-4xl">
                <div className="bg-white p-4 rounded shadow cursor-pointer hover:ring-2 ring-blue-500" onClick={() => onSelectTemplate('tpl-classic')}>
                    <div className="h-64 bg-gray-200 mb-4 flex items-center justify-center text-gray-400">Klasik Önizleme</div>
                    <h3 className="font-bold text-center">Klasik</h3>
                </div>
                <div className="bg-white p-4 rounded shadow cursor-pointer hover:ring-2 ring-blue-500" onClick={() => onSelectTemplate('tpl-compact')}>
                    <div className="h-64 bg-gray-200 mb-4 flex items-center justify-center text-gray-400">Kompakt Önizleme</div>
                    <h3 className="font-bold text-center">Kompakt</h3>
                </div>
              </div>
            </div>
          );
        };
        window.TemplateView = TemplateView;
    </script>

    <!-- 3. LandingView -->
    <script type="text/babel" data-type="module" data-presets="typescript,react">
        import React from 'react';

        const LandingView = ({ setView }) => {
          return (
            <div className="bg-white no-print">
              <header className="flex justify-between p-6 shadow-sm">
                <div className="font-bold text-xl">ATS-Friendly</div>
                <button className="bg-blue-600 text-white px-4 py-2 rounded" onClick={() => setView('auth')}>Giriş / Kayıt</button>
              </header>
              <main className="flex flex-col items-center justify-center py-20 px-6 text-center">
                <h1 className="text-5xl font-extrabold mb-6">ATS Uyumlu CV Oluşturucu</h1>
                <p className="text-xl text-gray-600 mb-8 max-w-2xl">Mobil uyumlu, basit ve ücretsiz.</p>
                <button className="bg-blue-600 text-white px-8 py-4 text-lg rounded-lg shadow-lg hover:bg-blue-700" onClick={() => setView('auth')}>Hemen Başla</button>
              </main>
            </div>
          );
        };
        window.LandingView = LandingView;
    </script>

    <!-- 4. AuthView -->
    <script type="text/babel" data-type="module" data-presets="typescript,react">
        import React, { useState } from 'react';

        const AuthView = ({ setView }) => {
          const [email, setEmail] = useState('');
          const [password, setPassword] = useState('');
          const [loading, setLoading] = useState(false);

          const handleAuth = async (e) => {
            e.preventDefault();
            setLoading(true);
            await window.FirebaseService.handleEmailAuth(true, email, password);
            setLoading(false);
          };

          return (
            <div className="flex items-center justify-center min-h-screen bg-gray-100 no-print">
              <form onSubmit={handleAuth} className="bg-white p-8 rounded shadow-md w-full max-w-md">
                <h2 className="text-2xl font-bold mb-6 text-center">Giriş Yap</h2>
                <input className="w-full p-3 border rounded mb-4" type="email" placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} required />
                <input className="w-full p-3 border rounded mb-6" type="password" placeholder="Şifre" value={password} onChange={e=>setPassword(e.target.value)} required />
                <button disabled={loading} className="w-full bg-blue-600 text-white p-3 rounded font-bold">
                    {loading ? '...' : 'Devam Et'}
                </button>
                <button type="button" onClick={() => window.FirebaseService.loginWithGoogle()} className="w-full mt-4 bg-white border border-gray-300 text-gray-700 p-3 rounded font-bold">
                    Google ile Giriş
                </button>
              </form>
            </div>
          );
        };
        window.AuthView = AuthView;
    </script>

    <!-- 5. EditorView (THE FIX) -->
    <script type="text/babel" data-type="module" data-presets="typescript,react">
        import React, { useState, useEffect, useRef, useCallback } from 'react';

        const generateId = () => `id_${Math.random().toString(36).substr(2, 9)}`;

        const initialFormData = {
            fullname: "Adınız Soyadınız",
            title: "Yazılım Mühendisi",
            email: "email@ornek.com",
            phone: "0555 555 55 55",
            address: "İstanbul, Türkiye",
            summary: "Deneyimli ve tutkulu bir yazılım geliştirici.",
            experiences: [],
            education: [],
            customSections: [],
        };

        const initialCvDoc = {
            formData: initialFormData,
            template: 'tpl-classic',
            theme: { color: '#2c3e50', font: 'ptserif' },
            layout: { fontSize: 11, lineHeight: 1.4 },
        };

        // --- CV Component (A4 Fixed Size) ---
        const CVPreview = ({ cvData }) => {
            const { formData, template } = cvData;
            return (
                <div className="bg-white shadow-xl text-black print-area" style={{
                    width: '794px',   // A4 Width @ 96DPI
                    minHeight: '1123px', // A4 Height @ 96DPI
                    padding: '40px',
                    boxSizing: 'border-box',
                    fontFamily: cvData.theme.font === 'ptserif' ? '"PT Serif", serif' : 'sans-serif',
                    fontSize: `${cvData.layout.fontSize}pt`,
                    lineHeight: cvData.layout.lineHeight
                }}>
                    {/* Header */}
                    <div className="border-b-2 pb-4 mb-6" style={{borderColor: cvData.theme.color}}>
                        <h1 className="text-4xl font-bold uppercase tracking-wider" style={{color: cvData.theme.color}}>{formData.fullname}</h1>
                        <p className="text-xl mt-1">{formData.title}</p>
                        <div className="flex flex-wrap gap-4 mt-3 text-sm text-gray-600">
                            {formData.phone && <span>📞 {formData.phone}</span>}
                            {formData.email && <span>✉️ {formData.email}</span>}
                            {formData.address && <span>📍 {formData.address}</span>}
                        </div>
                    </div>

                    {/* Summary */}
                    <div className="mb-6">
                        <h3 className="font-bold text-sm uppercase tracking-widest mb-2 border-b" style={{color: cvData.theme.color, borderColor: '#eee'}}>Profil</h3>
                        <p>{formData.summary}</p>
                    </div>

                    {/* Experience */}
                    {formData.experiences.length > 0 && (
                        <div className="mb-6">
                            <h3 className="font-bold text-sm uppercase tracking-widest mb-4 border-b" style={{color: cvData.theme.color, borderColor: '#eee'}}>Deneyim</h3>
                            <div className="space-y-4">
                                {formData.experiences.map(exp => (
                                    <div key={exp.id} className="grid grid-cols-[100px_1fr] gap-4">
                                        <div className="text-sm font-bold text-gray-500">{exp.date}</div>
                                        <div>
                                            <div className="font-bold text-lg">{exp.title}</div>
                                            <div className="text-gray-700 italic mb-1">{exp.company}</div>
                                            <p className="whitespace-pre-wrap">{exp.desc}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const EditorView = ({ user }) => {
            const [cvData, setCvData] = useState(null);
            const [activeTab, setActiveTab] = useState('edit'); // 'edit' or 'preview'
            const [isMobile, setIsMobile] = useState(window.innerWidth < 1024);
            const [scale, setScale] = useState(1);

            // Fetch Data
            useEffect(() => {
                window.FirebaseService.getCvDocument(user.uid).then(doc => {
                    setCvData(doc || initialCvDoc);
                });
            }, [user.uid]);

            // Auto Save
            const saveData = (newData) => {
                setCvData(newData);
                window.FirebaseService.saveCvDocument(user.uid, newData);
            };

            const updateField = (field, value) => {
                saveData({
                    ...cvData,
                    formData: { ...cvData.formData, [field]: value }
                });
            };

            // Responsive Logic
            useEffect(() => {
                const handleResize = () => {
                    const mobile = window.innerWidth < 1024;
                    setIsMobile(mobile);
                    
                    if (mobile) {
                        const availableWidth = window.innerWidth - 32; // 16px padding on each side
                        const newScale = Math.min(1, availableWidth / 794);
                        setScale(newScale);
                    } else {
                        setScale(1);
                    }
                };
                window.addEventListener('resize', handleResize);
                handleResize(); // Init
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            if (!cvData) return <div className="flex h-screen items-center justify-center">Yükleniyor...</div>;

            return (
                <div className="flex flex-col lg:flex-row h-screen bg-gray-100 overflow-hidden">
                    
                    {/* LEFT PANEL: EDITOR */}
                    <div className={`flex-1 flex flex-col h-full bg-white shadow-xl z-10 lg:w-1/2 overflow-hidden ${isMobile && activeTab === 'preview' ? 'hidden' : 'flex'}`}>
                        <div className="p-4 bg-gray-800 text-white flex justify-between items-center no-print">
                            <h2 className="font-bold">Editör</h2>
                            <button onClick={window.FirebaseService.logout} className="text-xs bg-red-600 px-2 py-1 rounded">Çıkış</button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-6 space-y-6">
                            {/* Simple Form Fields */}
                            <div className="space-y-4">
                                <h3 className="font-bold text-gray-700 border-b pb-2">Kişisel</h3>
                                <input className="w-full p-2 border rounded" placeholder="Ad Soyad" value={cvData.formData.fullname} onChange={e=>updateField('fullname', e.target.value)} />
                                <input className="w-full p-2 border rounded" placeholder="Unvan" value={cvData.formData.title} onChange={e=>updateField('title', e.target.value)} />
                                <div className="grid grid-cols-2 gap-2">
                                    <input className="p-2 border rounded" placeholder="Tel" value={cvData.formData.phone} onChange={e=>updateField('phone', e.target.value)} />
                                    <input className="p-2 border rounded" placeholder="Email" value={cvData.formData.email} onChange={e=>updateField('email', e.target.value)} />
                                </div>
                                <textarea className="w-full p-2 border rounded" rows="3" placeholder="Özet" value={cvData.formData.summary} onChange={e=>updateField('summary', e.target.value)}></textarea>
                            </div>

                            <div className="space-y-4">
                                <h3 className="font-bold text-gray-700 border-b pb-2 flex justify-between">
                                    <span>Deneyim</span>
                                    <button onClick={() => {
                                        const newExps = [...cvData.formData.experiences, {id: generateId(), title: 'Yeni Pozisyon', company: 'Şirket', date: '2023', desc: ''}];
                                        saveData({...cvData, formData: {...cvData.formData, experiences: newExps}});
                                    }} className="text-blue-600 text-sm">+ Ekle</button>
                                </h3>
                                {cvData.formData.experiences.map((exp, idx) => (
                                    <div key={exp.id} className="p-3 bg-gray-50 rounded border">
                                        <input className="w-full p-2 border rounded mb-2" placeholder="Başlık" value={exp.title} onChange={e=>{
                                            const newExps = [...cvData.formData.experiences];
                                            newExps[idx].title = e.target.value;
                                            saveData({...cvData, formData: {...cvData.formData, experiences: newExps}});
                                        }} />
                                        <textarea className="w-full p-2 border rounded" placeholder="Açıklama" value={exp.desc} onChange={e=>{
                                            const newExps = [...cvData.formData.experiences];
                                            newExps[idx].desc = e.target.value;
                                            saveData({...cvData, formData: {...cvData.formData, experiences: newExps}});
                                        }}></textarea>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* RIGHT PANEL: PREVIEW */}
                    <div className={`lg:flex-1 bg-gray-500 overflow-y-auto flex justify-center lg:items-start lg:pt-10 ${isMobile && activeTab === 'edit' ? 'hidden' : 'flex'}`}>
                        {/* 
                           WRAPPER DÜZELTMESİ:
                           Wrapper genişliği (width) artık dinamik olarak ölçeklenen genişliğe (794 * scale) eşitleniyor.
                           Ve 'margin: 0 auto' ile ortalanıyor. Böylece sola yaslama veya boşluk sorunu kalkıyor.
                        */}
                        <div style={{
                            width: isMobile ? `${794 * scale}px` : 'auto', // <--- DÜZELTME BURADA
                            height: isMobile ? `${1123 * scale + 40}px` : 'auto',
                            margin: isMobile ? '0 auto' : '0', // <--- VE BURADA
                            overflow: 'hidden',
                            display: 'block', // Flex yerine block + margin auto daha güvenli
                            paddingTop: isMobile ? '20px' : '0'
                        }}>
                             <div style={{
                                width: '794px',
                                height: '1123px',
                                transform: isMobile ? `scale(${scale})` : 'scale(1)',
                                transformOrigin: 'top left',
                             }}>
                                <CVPreview cvData={cvData} />
                             </div>
                        </div>
                    </div>

                    {/* MOBILE TAB BAR */}
                    {isMobile && (
                        <div className="fixed bottom-0 left-0 w-full bg-white border-t flex z-50 no-print safe-area-pb">
                            <button onClick={() => setActiveTab('edit')} className={`flex-1 p-4 font-bold ${activeTab === 'edit' ? 'text-blue-600' : 'text-gray-400'}`}>
                                ✏️ Düzenle
                            </button>
                            <button onClick={() => setActiveTab('preview')} className={`flex-1 p-4 font-bold ${activeTab === 'preview' ? 'text-blue-600' : 'text-gray-400'}`}>
                                👁️ Önizle
                            </button>
                            <button onClick={() => window.print()} className="flex-1 p-4 font-bold text-gray-600">
                                📥 İndir
                            </button>
                        </div>
                    )}
                </div>
            );
        };
        window.EditorView = EditorView;
    </script>

    <!-- 6. App & Index -->
    <script type="text/babel" data-type="module" data-presets="typescript,react">
        import React, { useState, useEffect } from 'react';
        import ReactDOM from 'react-dom/client';

        const App = () => {
            const [view, setView] = useState('landing');
            const [user, setUser] = useState(null);
            
            useEffect(() => {
                return window.FirebaseService.onAuthStateChanged(window.FirebaseService.auth, (u) => {
                    setUser(u);
                    if(u) setView('editor');
                    else if(view === 'editor') setView('landing');
                });
            }, [view]);

            const Views = {
                landing: window.LandingView,
                auth: window.AuthView,
                editor: window.EditorView
            };
            
            const CurrentView = Views[view];
            
            return <CurrentView setView={setView} user={user} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
