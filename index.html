
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ATS-Friendly CV Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=PT+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
      }
      .cv-preview-font {
        font-family: 'PT Serif', serif;
      }
      /* Debug Console Styles */
      #debug-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(185, 28, 28, 0.95);
        color: white;
        z-index: 9999;
        overflow: auto;
        padding: 2rem;
        font-family: monospace;
      }
      #debug-content {
        background: #000;
        border: 1px solid #444;
        padding: 1rem;
        border-radius: 0.5rem;
        white-space: pre-wrap;
      }
      @media print {
        body * {
          visibility: hidden;
        }
        .print-area, .print-area * {
          visibility: visible;
        }
        .print-area {
          position: absolute;
          left: 0;
          top: 0;
          width: 100%;
          height: 100%;
        }
        @page {
          size: A4;
          margin: 0;
        }
      }
    </style>
    
    <!-- Error Handler Script -->
    <script>
      window.onerror = function(msg, url, line, col, error) {
        const overlay = document.getElementById('debug-overlay');
        const content = document.getElementById('debug-content');
        if (overlay && content) {
          overlay.style.display = 'block';
          const time = new Date().toLocaleTimeString();
          content.innerText += `[${time}] ERROR: ${msg}\nFile: ${url}:${line}:${col}\nStack: ${error?.stack || 'N/A'}\n\n`;
        }
        console.error('Global Error Caught:', msg, error);
        return false; 
      };

      window.onunhandledrejection = function(event) {
        const overlay = document.getElementById('debug-overlay');
        const content = document.getElementById('debug-content');
        if (overlay && content) {
          overlay.style.display = 'block';
          content.innerText += `[Promise Rejection]: ${event.reason}\n\n`;
        }
      };
      
      console.log("System initializing...");
    </script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Import Map: FIXED VERSIONS -->
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "firebase/app": "https://esm.sh/firebase@10.12.2/app",
    "firebase/auth": "https://esm.sh/firebase@10.12.2/auth",
    "firebase/firestore": "https://esm.sh/firebase@10.12.2/firestore",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "firebase/": "https://esm.sh/firebase@^12.8.0/"
  }
}
</script>
  </head>
  <body>
    <!-- Debug Overlay -->
    <div id="debug-overlay">
      <h1 class="text-2xl font-bold mb-4">⚠️ Uygulama Hatası (Debug Modu)</h1>
      <p class="mb-4">Uygulama yüklenirken kritik bir hata oluştu. Aşağıdaki logları geliştiriciye iletin.</p>
      <div id="debug-content"></div>
      <button onclick="window.location.reload()" class="mt-4 px-4 py-2 bg-white text-red-900 font-bold rounded">Sayfayı Yenile</button>
    </div>

    <div id="root"></div>
    
    <!-- 
      We use only 'react' preset. 
      We removed 'typescript' preset and converted code to Pure JS to guarantee no parsing errors.
    -->
    <script type="text/babel" data-type="module" data-presets="react" src="./services/firebaseService.ts"></script>
    <script type="text/babel" data-type="module" data-presets="react" src="./components/TemplateView.tsx"></script>
    <script type="text/babel" data-type="module" data-presets="react" src="./components/LandingView.tsx"></script>
    <script type="text/babel" data-type="module" data-presets="react" src="./components/AuthView.tsx"></script>
    <script type="text/babel" data-type="module" data-presets="react" src="./components/EditorView.tsx"></script>
    <script type="text/babel" data-type="module" data-presets="react" src="./App.tsx"></script>
    <script type="text/babel" data-type="module" data-presets="react" src="./index.tsx"></script>
  </body>
</html>
