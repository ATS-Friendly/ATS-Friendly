    <script type="text/babel" data-type="module" data-presets="typescript,react">
        const LOCAL_STORAGE_USER_KEY = 'ats_mock_user';
        const LOCAL_STORAGE_DATA_KEY = 'ats_mock_data';
        const authObservers = [];

        const getMockUser = () => {
            const stored = localStorage.getItem(LOCAL_STORAGE_USER_KEY);
            return stored ? JSON.parse(stored) : null;
        };

        const auth = { currentUser: getMockUser() };

        const onAuthStateChanged = (authInstance, callback) => {
            authObservers.push(callback);
            callback(getMockUser());
            return () => {
                const index = authObservers.indexOf(callback);
                if (index > -1) authObservers.splice(index, 1);
            };
        };

        const notifyObservers = (user) => {
            auth.currentUser = user;
            authObservers.forEach(cb => cb(user));
        };

        const handleEmailAuth = async (isLogin, email, password) => {
            await new Promise(resolve => setTimeout(resolve, 600));
            const user = { uid: 'mock-user-' + Date.now(), email: email, displayName: email.split('@')[0] };
            localStorage.setItem(LOCAL_STORAGE_USER_KEY, JSON.stringify(user));
            notifyObservers(user);
            return user;
        };

        const loginWithGoogle = async () => {
            await new Promise(resolve => setTimeout(resolve, 600));
            const user = { uid: 'mock-google-' + Date.now(), email: 'google.user@example.com', displayName: 'Google User' };
            localStorage.setItem(LOCAL_STORAGE_USER_KEY, JSON.stringify(user));
            notifyObservers(user);
            return user;
        };

        const logout = async () => {
            localStorage.removeItem(LOCAL_STORAGE_USER_KEY);
            notifyObservers(null);
        };

        const saveCvDocument = async (userId, data) => {
            const allData = JSON.parse(localStorage.getItem(LOCAL_STORAGE_DATA_KEY) || '{}');
            allData[userId] = data;
            localStorage.setItem(LOCAL_STORAGE_DATA_KEY, JSON.stringify(allData));
        };

        const getCvDocument = async (userId) => {
            const allData = JSON.parse(localStorage.getItem(LOCAL_STORAGE_DATA_KEY) || '{}');
            return allData[userId] || null;
        };

        window.FirebaseService = {
            auth, onAuthStateChanged, handleEmailAuth, loginWithGoogle, logout, saveCvDocument, getCvDocument
        };
    </script>

            const [mobileView, setMobileView] = useState('edit'); // edit, preview
            const [openSection, setOpenSection] = useState('personal');
            const [isMobile, setIsMobile] = useState(window.innerWidth < 1024);
            const [scale, setScale] = useState(1);

            useEffect(() => {
                window.FirebaseService.getCvDocument(user.uid).then(doc => setCvData(doc || initialCvDoc));
            }, [user.uid]);

            useEffect(() => {
                const handleResize = () => {
                    const mobile = window.innerWidth < 1024;
                    setIsMobile(mobile);
                    // NUCLEAR OPTION CALCULATION
                    if (mobile) {
                        const availableWidth = window.innerWidth - 32; // 16px padding
                        setScale(Math.min(1, availableWidth / 794));
                    } else {
                        setScale(1);
                    }
                };
                window.addEventListener('resize', handleResize);
                handleResize();
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            const updateData = (newData) => {
                setCvData(newData);

            if (!cvData) return <div className="flex h-screen items-center justify-center bg-gray-100 text-gray-500">CV Yükleniyor...</div>;

            // CONTENT EDITOR FORM
            const ContentEditor = () => (
                <div className="space-y-2 pb-24 lg:pb-0">
                    <AccordionItem title="Kişisel Bilgiler" icon={User} isOpen={openSection === 'personal'} onToggle={() => setOpenSection(openSection === 'personal' ? '' : 'personal')}>

                            <input className="w-full p-2 border rounded text-sm" placeholder="Ad Soyad" value={cvData.formData.fullname} onChange={e => updateForm('fullname', e.target.value)} />
                            <input className="w-full p-2 border rounded text-sm" placeholder="Unvan" value={cvData.formData.title} onChange={e => updateForm('title', e.target.value)} />
                            <input className="w-full p-2 border rounded text-sm" placeholder="Email" value={cvData.formData.email} onChange={e => updateForm('email', e.target.value)} />
                            <input className="w-full p-2 border rounded text-sm" placeholder="Telefon" value={cvData.formData.phone} onChange={e => updateForm('phone', e.target.value)} />
                            <input className="w-full p-2 border rounded text-sm" placeholder="Adres" value={cvData.formData.address} onChange={e => updateForm('address', e.target.value)} />
                            <textarea className="w-full p-2 border rounded text-sm" rows={4} placeholder="Özet / Hakkımda" value={cvData.formData.summary} onChange={e => updateForm('summary', e.target.value)} />
                        </div>
                    </AccordionItem>
                    
                    <AccordionItem title="İş Deneyimi" icon={Briefcase} isOpen={openSection === 'exp'} onToggle={() => setOpenSection(openSection === 'exp' ? '' : 'exp')}>
                        {cvData.formData.experiences.map((exp, idx) => (
                            <div key={exp.id} className="mb-4 p-3 bg-gray-50 rounded border border-gray-200 relative group">
                                <button onClick={() => {
                                    const newExps = cvData.formData.experiences.filter(e => e.id !== exp.id);
                                    updateForm('experiences', newExps);
                                }} className="absolute top-2 right-2 text-red-400 hover:text-red-600"><Trash2 size={16}/></button>
                                <input className="w-full p-2 border rounded text-sm mb-2" placeholder="Pozisyon" value={exp.title} onChange={e => {
                                    const exps = [...cvData.formData.experiences]; exps[idx].title = e.target.value; updateForm('experiences', exps);
                                }} />
                                <input className="w-full p-2 border rounded text-sm mb-2" placeholder="Şirket" value={exp.company} onChange={e => {
                                    const exps = [...cvData.formData.experiences]; exps[idx].company = e.target.value; updateForm('experiences', exps);
                                }} />
                                <input className="w-full p-2 border rounded text-sm mb-2" placeholder="Tarih" value={exp.date} onChange={e => {
                                    const exps = [...cvData.formData.experiences]; exps[idx].date = e.target.value; updateForm('experiences', exps);
                                }} />
                                <textarea className="w-full p-2 border rounded text-sm" rows={3} placeholder="Açıklama" value={exp.desc} onChange={e => {
                                    const exps = [...cvData.formData.experiences]; exps[idx].desc = e.target.value; updateForm('experiences', exps);
                                }} />
                            </div>
                        ))}
                        <button onClick={() => updateForm('experiences', [...cvData.formData.experiences, { id: generateId(), title: '', company: '', date: '', desc: '' }])} className="w-full py-2 border-2 border-dashed border-blue-200 text-blue-600 rounded font-medium hover:bg-blue-50">+ Ekle</button>
                    </AccordionItem>

                    <AccordionItem title="Eğitim" icon={GraduationCap} isOpen={openSection === 'edu'} onToggle={() => setOpenSection(openSection === 'edu' ? '' : 'edu')}>
                        {cvData.formData.education.map((edu, idx) => (
                            <div key={edu.id} className="mb-4 p-3 bg-gray-50 rounded border border-gray-200 relative">
                                <button onClick={() => updateForm('education', cvData.formData.education.filter(e => e.id !== edu.id))} className="absolute top-2 right-2 text-red-400 hover:text-red-600"><Trash2 size={16}/></button>
                                <input className="w-full p-2 border rounded text-sm mb-2" placeholder="Bölüm / Derece" value={edu.degree} onChange={e => {
                                    const edus = [...cvData.formData.education]; edus[idx].degree = e.target.value; updateForm('education', edus);
                                }} />
                                <input className="w-full p-2 border rounded text-sm mb-2" placeholder="Okul" value={edu.school} onChange={e => {
                                    const edus = [...cvData.formData.education]; edus[idx].school = e.target.value; updateForm('education', edus);
                                }} />
                                <input className="w-full p-2 border rounded text-sm" placeholder="Tarih" value={edu.date} onChange={e => {
                                    const edus = [...cvData.formData.education]; edus[idx].date = e.target.value; updateForm('education', edus);
                                }} />
                            </div>
                        ))}
                         <button onClick={() => updateForm('education', [...cvData.formData.education, { id: generateId(), degree: '', school: '', date: '' }])} className="w-full py-2 border-2 border-dashed border-blue-200 text-blue-600 rounded font-medium hover:bg-blue-50">+ Ekle</button>
                    </AccordionItem>

                    <AccordionItem title="Yetenekler" icon={PenTool} isOpen={openSection === 'skills'} onToggle={() => setOpenSection(openSection === 'skills' ? '' : 'skills')}>
                        <textarea className="w-full p-2 border rounded text-sm" rows={4} placeholder="Yeteneklerinizi virgülle ayırarak yazın..." value={cvData.formData.skills} onChange={e => updateForm('skills', e.target.value)} />
                    </AccordionItem>
                </div>
            );

            // DESIGN EDITOR
            const DesignEditor = () => (
                <div className="space-y-6 p-4">
                    <div>
                        <label className="block text-sm font-medium text-gray-700 mb-2 flex items-center gap-2"><Palette size={16}/> Tema Rengi</label>
                        <div className="flex flex-wrap gap-3">
                            {['#2563eb', '#dc2626', '#16a34a', '#d97706', '#9333ea', '#27272a'].map(color => (
                                <button key={color} onClick={() => updateTheme('color', color)} className={`w-8 h-8 rounded-full border-2 ${cvData.theme.color === color ? 'border-gray-900 scale-110' : 'border-transparent'}`} style={{ backgroundColor: color }} />
                            ))}
                        </div>
                    </div>
                    <div>
                        <label className="block text-sm font-medium text-gray-700 mb-2 flex items-center gap-2"><Type size={16}/> Yazı Fontu</label>
                        <select value={cvData.theme.font} onChange={e => updateTheme('font', e.target.value)} className="w-full p-2 border rounded bg-white">
                            <option value="font-jakarta">Plus Jakarta (Modern)</option>
                            <option value="font-ptserif">PT Serif (Klasik)</option>
                            <option value="font-inter">Inter (Clean)</option>
                            <option value="font-merriweather">Merriweather (Okunaklı)</option>
                        </select>
                    </div>
                    <div className="border-t pt-4">
                        <label className="block text-sm font-medium text-gray-700 mb-2 flex items-center gap-2"><MoveVertical size={16}/> Yazı Boyutu: {cvData.layout.fontSize}pt</label>
                        <input type="range" min="9" max="14" step="0.5" value={cvData.layout.fontSize} onChange={e => updateLayout('fontSize', parseFloat(e.target.value))} className="w-full accent-blue-600" />
                    </div>
                     <div>
                        <label className="block text-sm font-medium text-gray-700 mb-2 flex items-center gap-2"><Layout size={16}/> Satır Aralığı: {cvData.layout.lineHeight}</label>
                        <input type="range" min="1" max="2" step="0.1" value={cvData.layout.lineHeight} onChange={e => updateLayout('lineHeight', parseFloat(e.target.value))} className="w-full accent-blue-600" />
                    </div>
                     <div>
                        <label className="block text-sm font-medium text-gray-700 mb-2">Kenar Boşluğu: {cvData.layout.margin}px</label>
                        <input type="range" min="10" max="40" step="5" value={cvData.layout.margin} onChange={e => updateLayout('margin', parseInt(e.target.value))} className="w-full accent-blue-600" />
                    </div>
                </div>
            );

            return (
                <div className="flex h-screen bg-gray-100 overflow-hidden font-jakarta">
                    
                    {/* --- DESKTOP LEFT SIDEBAR (EDITOR) --- */}
                    <aside className={`flex flex-col w-full lg:w-[400px] bg-white shadow-xl z-20 transition-transform duration-300 ${isMobile && mobileView === 'preview' ? 'hidden' : 'flex'}`}>
                        {/* Toolbar */}
                        <div className="h-16 border-b flex items-center justify-between px-4 bg-white">
                            <div className="flex gap-4">
                                <button onClick={() => setActiveTab('content')} className={`pb-1 border-b-2 font-medium text-sm ${activeTab === 'content' ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500'}`}>İçerik</button>
                                <button onClick={() => setActiveTab('design')} className={`pb-1 border-b-2 font-medium text-sm ${activeTab === 'design' ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500'}`}>Tasarım</button>
                            </div>
                            <button onClick={window.FirebaseService.logout} className="text-gray-400 hover:text-red-600"><LogOut size={18}/></button>
                        </div>
                        
                        {/* Scrollable Form Area */}
                        <div className="flex-1 overflow-y-auto custom-scroll p-4">
                            {activeTab === 'content' ? <ContentEditor /> : <DesignEditor />}
                        </div>
                    </aside>

                    {/* --- RIGHT SIDEBAR (PREVIEW) --- */}
                    <main className={`flex-1 bg-gray-500/10 overflow-hidden relative flex flex-col ${isMobile && mobileView === 'edit' ? 'hidden' : 'flex'}`}>
                        
                        {/* Desktop Header */}
                        <div className="h-16 bg-white border-b flex items-center justify-between px-6 shadow-sm z-10 hidden lg:flex">
                            <h2 className="font-bold text-gray-700">Canlı Önizleme</h2>
                            <button onClick={() => window.print()} className="flex items-center gap-2 bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors">
                                <Download size={18} /> PDF İndir
                            </button>
                        </div>

                        {/* Preview Area with NUCLEAR SCALING FIX */}
                        <div className="flex-1 overflow-y-auto flex justify-center p-0 lg:p-8 bg-gray-100 lg:bg-gray-200">
                             <div style={{
                                width: isMobile ? `${794 * scale}px` : 'auto', // Mobile: Match scaled width. Desktop: auto
                                height: isMobile ? `${1123 * scale + 40}px` : 'auto', // Mobile: Match scaled height + margin
                                margin: isMobile ? '0 auto' : '0', // Mobile: Center it
                                paddingTop: isMobile ? '20px' : '0',
                                transform: !isMobile ? 'scale(1)' : 'none' // Desktop: No scaling needed on container
                            }}>
                                <div style={{
                                    width: '794px',
                                    height: '1123px',
                                    transform: isMobile ? `scale(${scale})` : 'scale(1)', // Scale content
                                    transformOrigin: 'top left', // Anchor to corner
                                    backgroundColor: 'white',
                                    boxShadow: isMobile ? '0 4px 6px -1px rgba(0, 0, 0, 0.1)' : 'none'
                                }}>
                                    <CVPreview cvData={cvData} />
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* --- MOBILE BOTTOM NAVIGATION --- */}
                    {isMobile && (
                        <nav className="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 flex justify-around items-center h-16 z-50 px-2 shadow-lg safe-area-pb no-print">
                             <button onClick={() => setMobileView('edit')} className={`flex flex-col items-center gap-1 p-2 rounded-lg ${mobileView === 'edit' ? 'text-blue-600 bg-blue-50' : 'text-gray-500'}`}>
                                <PenTool size={20} />
                                <span className="text-xs font-medium">Düzenle</span>
                            </button>
                            <button onClick={() => setMobileView('preview')} className={`flex flex-col items-center gap-1 p-2 rounded-lg ${mobileView === 'preview' ? 'text-blue-600 bg-blue-50' : 'text-gray-500'}`}>
                                <FileText size={20} />
                                <span className="text-xs font-medium">Önizle</span>
                            </button>
                             <button onClick={() => window.print()} className="flex flex-col items-center gap-1 p-2 rounded-lg text-gray-500 hover:text-gray-900">
                                <Download size={20} />
                                <span className="text-xs font-medium">İndir</span>
                            </button>
                        </nav>
                    )}
                </div>
            );
        };
        window.EditorView = EditorView;
    </script>

    <!-- 6. App Root -->
    <script type="text/babel" data-type="module" data-presets="typescript,react">
        import React, { useState, useEffect } from 'react';
        import ReactDOM from 'react-dom/client';

        const App = () => {
            const [view, setView] = useState('landing');
            const [user, setUser] = useState(null);
            
            useEffect(() => {
                return window.FirebaseService.onAuthStateChanged(window.FirebaseService.auth, (u) => {
                    setUser(u);
                    if(u && view === 'landing') setView('template'); // Go to template selection after login
                    else if(!u) setView('landing');
                });
            }, []);

            // Routing Logic
            const renderView = () => {
                switch(view) {
                    case 'landing': return <window.LandingView setView={setView} />;
                    case 'auth': return <window.AuthView setView={setView} />;
                    case 'template': return <window.TemplateView onSelectTemplate={(tpl) => {
                        // In a real app, save template choice here
                        setView('editor');
                    }} />;
                    case 'editor': return <window.EditorView user={user} setView={setView} />;
                    default: return <window.LandingView setView={setView} />;
                }
            };

            return renderView();
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
