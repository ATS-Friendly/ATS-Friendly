      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
      }
      .cv-preview-font {
        font-family: 'PT Serif', serif;
      }
      @media print {
        body * {
          visibility: hidden;
        }
        .print-area, .print-area * {
          visibility: visible;
        }
        .print-area {
          position: absolute;
          left: 0;
          top: 0;
          width: 100%;
          height: 100%;
        }
        @page {
          size: A4;
          margin: 0;
        }
      }
    </style>
